name: E2E

on:
  push:
    branches: [main, "feature/**", "e2e/**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      # The app throws at boot without this. Tests are hermetic (every /api
      # call is intercepted by page.route), so the value is never reached —
      # it just has to be a valid, non-empty URL.
      VITE_BASE_URL: "http://localhost:9999/api"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provide dev-server env
        run: echo "VITE_BASE_URL=$VITE_BASE_URL" > .env

      - name: Install Playwright browsers
        # Pixel 5 (mobile project) also runs on Chromium, so only chromium is needed.
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces/screenshots)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
